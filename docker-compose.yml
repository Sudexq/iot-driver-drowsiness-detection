version: "3.8"

services:

  # ── Flask API ──────────────────────────────────────────────────
  flask_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot_flask_api
    ports:
      - "5000:5000"
    environment:
      - IOT_HMAC_SECRET=${IOT_HMAC_SECRET}
      - IOT_API_KEY=${IOT_API_KEY}
      - READINGS_ENCRYPT=${READINGS_ENCRYPT:-false}
      - READINGS_ENCRYPT_KEY=${READINGS_ENCRYPT_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── UDP Bridge ─────────────────────────────────────────────────
  udp_bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot_udp_bridge
    ports:
      - "9999:9999/udp"
    environment:
      - IOT_HMAC_SECRET=${IOT_HMAC_SECRET}
      - IOT_API_KEY=${IOT_API_KEY}
    command: python network/udp_bridge.py
    restart: unless-stopped
    depends_on:
      flask_api:
        condition: service_healthy

  # ── Simulator ──────────────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot_simulator
    environment:
      - IOT_HMAC_SECRET=${IOT_HMAC_SECRET}
      - IOT_API_KEY=${IOT_API_KEY}
    command: python sensor/simulator.py
    restart: unless-stopped
    depends_on:
      - udp_bridge

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: iot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    restart: unless-stopped
    depends_on:
      - flask_api

volumes:
  grafana_data:
    driver: local