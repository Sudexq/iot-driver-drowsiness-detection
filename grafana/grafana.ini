#################################### Grafana Güvenlik Konfigürasyonu ####################################
# Bu dosya Grafana'nın güvenli çalışması için minimum ayarları içerir.
# Kullanıcı adı ve şifre bu dosyaya yazılmaz — docker-compose.yml üzerinden
# .env dosyasından ortam değişkeni olarak geçirilir.

[server]
# Protokol (http veya https — üretimde https kullanın)
protocol = http
# Grafana'nın dinleyeceği port
http_port = 3000

[security]
# Admin kullanıcı adı ve şifresi docker-compose.yml üzerinden
# GF_SECURITY_ADMIN_USER ve GF_SECURITY_ADMIN_PASSWORD env değişkenlerinden gelir.
# Bu satırlar sadece referans amaçlıdır — gerçek değer .env'den okunur.
# admin_user = (docker-compose'daki GF_SECURITY_ADMIN_USER)
# admin_password = (docker-compose'daki GF_SECURITY_ADMIN_PASSWORD)

# Cookie'leri daha güvenli hale getir (HTTPS'de kullanın)
cookie_secure = false

# X-Frame-Options başlığı — clickjacking koruması
allow_embedding = false

# Content Security Policy
content_security_policy = false

[users]
# Yeni kullanıcı kaydını kapat — sadece admin kullanıcı olacak
allow_sign_up = false
# Otomatik kullanıcı oluşturmayı kapat
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
# Anonim erişimi tamamen kapat
enabled = false

[analytics]
# Grafana'ya kullanım verisi gönderme
reporting_enabled = false
check_for_updates = false

[log]
# Grafana log seviyesi (info, warn, error, critical)
level = warn
